jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Restore Packages
        run: nuget restore Twol.sln
      - name: Build Solution
        run: msbuild YourSolution.sln /p:Configuration=Release /p:OutputPath=./build-output          
      - name: Upload Zipped Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegacyWinForms-Release
          path: ./build-output
